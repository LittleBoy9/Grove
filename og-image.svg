<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030b08"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#5ee89a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5ee89a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#50d4f0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#50d4f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#c5ffe0"/>
      <stop offset="100%" stop-color="#5ee89a"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3324"/>
      <stop offset="100%" stop-color="#041a10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid overlay -->
  <g stroke="#5ee89a" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Grove icon -->
  <g transform="translate(90, 200)">
    <rect width="110" height="110" rx="26" fill="url(#iconBg)" stroke="#5ee89a" stroke-opacity="0.25" stroke-width="1.5"/>
    <g stroke="#ffffff" stroke-linecap="round" fill="none" transform="translate(55, 58) scale(0.065)">
      <line x1="0" y1="270" x2="0" y2="0" stroke-width="90"/>
      <path d="M0 0 Q-70 -130 -230 -280" stroke-width="75"/>
      <line x1="0" y1="0" x2="0" y2="-330" stroke-width="75"/>
      <path d="M0 0 Q70 -130 230 -280" stroke-width="75"/>
    </g>
    <circle cx="86" cy="23" r="7" fill="#6EE7A0"/>
    <circle cx="55" cy="18" r="7" fill="#6EE7A0"/>
    <circle cx="24" cy="23" r="7" fill="#6EE7A0"/>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(90, 145)">
    <rect width="310" height="42" rx="21" fill="#0a1f14" stroke="#5ee89a" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="22" cy="21" r="5" fill="#5ee89a"/>
    <text x="40" y="28" font-family="-apple-system, Inter, sans-serif" font-size="15" font-weight="500" fill="#c0f5d8">macOS · Free &amp; Open Source</text>
  </g>

  <!-- Headline -->
  <text x="230" y="260" font-family="-apple-system, 'Space Grotesk', sans-serif" font-size="96" font-weight="800" fill="#f0fdf5" letter-spacing="-5">Grove</text>

  <!-- Tagline -->
  <text x="90" y="400" font-family="-apple-system, 'Space Grotesk', sans-serif" font-size="58" font-weight="700" fill="url(#headline)" letter-spacing="-2.5">Native macOS Git Dashboard</text>

  <!-- Description -->
  <text x="90" y="455" font-family="-apple-system, Inter, sans-serif" font-size="24" font-weight="400" fill="#5a8a6e">All your repos. One workspace. No terminal needed.</text>

  <!-- Footer row -->
  <g transform="translate(90, 540)">
    <circle cx="0" cy="0" r="4" fill="#5ee89a"/>
    <text x="14" y="6" font-family="-apple-system, Inter, sans-serif" font-size="18" fill="#c0f5d8" font-weight="500">littleboy9.github.io/Grove</text>

    <text x="720" y="6" font-family="-apple-system, Inter, sans-serif" font-size="16" fill="#5a8a6e">Built with Tauri · Rust · React</text>
  </g>

  <!-- Accent line -->
  <line x1="90" y1="580" x2="1110" y2="580" stroke="#5ee89a" stroke-opacity="0.15" stroke-width="1"/>
</svg>
